<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TV Series</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <div class="card">
      <div class="card-header text-white" style="background-color: #29b6c8;">
        <strong>📺 TV Series</strong>
      </div>
      <div class="card-body p-0">
        <div class="row g-0">

          <div class="col-7">
            <table class="table table-striped mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Channel</th>
                  <th>Seasons</th>
                </tr>
              </thead>
              <tbody id="series"></tbody>
            </table>
            <div class="p-3">
              <p id="promedio" class="mb-0"></p>
            </div>
          </div>

          <div class="col-5 border-start" id="card"></div>

        </div>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/index.js"></script>
</body>
</html>
